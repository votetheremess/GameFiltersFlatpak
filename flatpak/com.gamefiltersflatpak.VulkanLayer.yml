app-id: com.gamefiltersflatpak.VulkanLayer
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
build-extension: true
separate-locales: false
appstream-compose: false
build-options:
  prefix: /usr/lib/extensions/vulkan/gamefiltersflatpak
  prepend-path: /usr/lib/sdk/rust-stable/bin
  prepend-pkg-config-path: /usr/lib/pkgconfig
  env:
    PATH: /app/bin:/usr/bin:/usr/lib/sdk/rust-stable/bin
modules:
  - name: game-filters-flatpak-layer
    buildsystem: meson
    subdir: layer
    config-opts:
      - --libdir=lib
      - --buildtype=release
    sources:
      - type: dir
        path: ..
